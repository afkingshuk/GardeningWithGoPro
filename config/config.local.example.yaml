app:
  timezone: America/New_York
  workspace: ../GardeningWithGoProStorage

gopro:
  wifi_connection_name: K GoPro MAX
  media_extensions:
    - .jpg
    - .jpeg
    - .gpr

sync:
  source: wifi

sdcard:
  # Either the DCIM directory itself, or a mount root that contains DCIM.
  # Example: /media/$USER/GOPROSD or /media/$USER/GOPROSD/DCIM
  source_dir: ""

home_network:
  wifi_connection_name: No_Connection

nas:
  enabled: false
  mount_point: /mnt/knas
  target_dir: /mnt/knas/GoPro/GardeningWithGoPro
  mount_method: fstab
  protocol: cifs
  share: //knas.local/incoming
  credentials_file: ~/.smbcredentials-gopro
  version: "3.0"
  mount_options: []
  use_sudo: false
  mount_script: scripts/mount_nas.sh
  unmount_script: scripts/unmount_nas.sh

encoding:
  fps: 24
  codec: libx264
  crf: 18
  preset: medium
